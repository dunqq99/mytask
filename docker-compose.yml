version: '3.8'

services:
  # Dịch vụ Cơ sở dữ liệu PostgreSQL
  db:
    image: postgres:14-alpine
    container_name: zenboard-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zenboard
    ports:
      - "127.0.0.1:5433:5432" # Chỉ cho truy cập database từ nội bộ VPS (localhost) trên cổng 5433 để tăng bảo mật và tránh trùng cổng ngoài
    volumes:
      - pgdata:/var/lib/postgresql/data

  # Dịch vụ Express Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zenboard-backend
    restart: always
    depends_on:
      - db
    environment:
      PGHOST: db       # Kết nối tới container db qua mạng nội bộ Docker
      PGPORT: 5432     # Sử dụng cổng Postgres mặc định trong mạng Docker
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: zenboard
      PORT: 3001
    # Bỏ phần ports ở host vì Nginx sẽ giao tiếp nội bộ trong mạng Docker của compose, tránh trùng cổng 3001 ở host

  # Dịch vụ Nginx Web Server (Frontend React + Reverse Proxy)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zenboard-frontend
    restart: always
    ports:
      - "8085:80"        # Thay đổi từ 80:80 sang 8085:80 để tránh trùng cổng 80 của các web server khác trên VPS
    depends_on:
      - backend

volumes:
  pgdata: # Volume để lưu trữ dữ liệu PostgreSQL lâu dài không bị mất khi restart container
