version: '3.8'

services:
  # Dịch vụ Cơ sở dữ liệu PostgreSQL
  db:
    image: postgres:14-alpine
    container_name: zenboard-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432" # Chỉ cho truy cập database từ nội bộ VPS (localhost) qua cổng cấu hình trong .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d zenboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Dịch vụ Express Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: zenboard-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGHOST: db       # Kết nối tới container db qua mạng nội bộ Docker
      PGPORT: 5432     # Sử dụng cổng Postgres mặc định trong mạng Docker
      PGUSER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: ${POSTGRES_DB}
      PORT: ${BACKEND_PORT}
      TZ: ${TZ}
    volumes:
      - ./backups:/app/backups
    # Bỏ phần ports ở host vì Nginx sẽ giao tiếp nội bộ trong mạng Docker của compose, tránh trùng cổng ở host

  # Dịch vụ Nginx Web Server (Frontend React + Reverse Proxy)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: zenboard-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT}:80"        # Sử dụng cổng cấu hình trong .env để tránh trùng cổng của các web server khác trên VPS
    environment:
      TZ: ${TZ}
    depends_on:
      - backend

volumes:
  pgdata: # Volume để lưu trữ dữ liệu PostgreSQL lâu dài không bị mất khi restart container
